<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}ERPy-Lite{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-box-seam-fill"></i> ERPy-Lite
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navMain" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link {% if request.path == '/inventario' %}active{% endif %}"
                       href="/inventario">
                        <i class="bi bi-boxes"></i> Inventario
                    </a>
                    <a class="nav-link {% if request.path == '/producto/nuevo' %}active{% endif %}"
                       href="/producto/nuevo">
                        <i class="bi bi-plus-circle"></i> Nuevo Producto
                    </a>
                    <a class="nav-link {% if request.path == '/venta/nueva' %}active{% endif %}"
                       href="/venta/nueva">
                        <i class="bi bi-cart-plus"></i> Nueva Venta
                    </a>
                    <a class="nav-link {% if request.path == '/analytics' %}active{% endif %}"
                       href="/analytics">
                        <i class="bi bi-graph-up"></i> Análisis
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                {% for categoria, msg in mensajes %}
                    <div class="alert alert-{{ categoria }} alert-dismissible fade show">
                        <i class="bi bi-{% if categoria == 'success' %}check-circle{% elif categoria == 'danger' %}exclamation-triangle{% else %}info-circle{% endif %}-fill me-2"></i>
                        {{ msg }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block contenido %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
