<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - ERPy-Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: #666;
            font-size: 0.95rem;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
        }
        .form-control::placeholder {
            color: #999;
        }
        .btn-register {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .auth-link p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0;
        }
        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .auth-link a:hover {
            color: #764ba2;
        }
        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 1.5rem;
        }
        .alert-danger {
            background-color: #fee;
            color: #c33;
        }
        .password-strength {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            display: none;
        }
        .password-strength.weak {
            display: block;
            background-color: #ffebee;
            color: #c62828;
        }
        .password-strength.ok {
            display: block;
            background-color: #fff3e0;
            color: #e65100;
        }
        .password-strength.strong {
            display: block;
            background-color: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>👤 Crear Cuenta</h1>
                <p>Únete a ERPy-Lite hoy</p>
            </div>

            {% with mensajes = get_flashed_messages(category_filter=["danger", "warning"]) %}
                {% if mensajes %}
                    {% for msg in mensajes %}
                        <div class="alert alert-danger" role="alert">
                            {{ msg }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" 
                           name="email" placeholder="tu@email.com" required>
                </div>

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" 
                           name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="mb-3">
                    <label for="contraseña" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="contraseña" 
                           name="contraseña" placeholder="••••••••" required
                           onkeyup="verificarFuerza()">
                    <div id="strength" class="password-strength"></div>
                </div>

                <div class="mb-3">
                    <label for="contraseña2" class="form-label">Confirmar Contraseña</label>
                    <input type="password" class="form-control" id="contraseña2" 
                           name="contraseña2" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-register">
                    Crear Cuenta
                </button>
            </form>

            <div class="auth-link">
                <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script>
        function verificarFuerza() {
            const pwd = document.getElementById('contraseña').value;
            const strength = document.getElementById('strength');
            
            if (pwd.length < 6) {
                strength.textContent = '❌ Contraseña muy corta (mínimo 6 caracteres)';
                strength.className = 'password-strength weak';
            } else if (pwd.length < 8) {
                strength.textContent = '⚠️ Contraseña débil';
                strength.className = 'password-strength ok';
            } else {
                strength.textContent = '✓ Contraseña fuerte';
                strength.className = 'password-strength strong';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
