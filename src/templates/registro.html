<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - ERPy-Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            border-radius: 50%;
        }

        .auth-container::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
            bottom: -100px;
            left: -80px;
            border-radius: 50%;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            transition: box-shadow 0.3s ease;
        }

        .auth-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.06);
        }

        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }

        .auth-brand-icon {
            width: 48px;
            height: 48px;
            background: var(--nav-bg);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--primary);
        }

        .auth-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            margin-bottom: 0;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text);
            margin-bottom: 0.35rem;
        }

        .auth-card .form-control {
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            padding: 0.7rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: var(--card-bg);
            color: var(--text);
        }

        .auth-card .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .auth-card .form-control::placeholder {
            color: var(--text-muted);
        }

        .btn-register {
            width: 100%;
            padding: 0.7rem;
            font-size: 0.95rem;
            font-weight: 600;
            background: var(--primary);
            border: none;
            border-radius: 0.5rem;
            color: white;
            transition: all 0.2s ease;
            margin-top: 0.75rem;
        }

        .btn-register:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            color: white;
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .auth-link p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0;
        }

        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-link a:hover {
            color: var(--primary-hover);
        }

        .auth-card .alert {
            border-radius: var(--radius);
            border: none;
            margin-bottom: 1.25rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .auth-card .alert-danger {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .input-group-icon {
            position: relative;
        }

        .input-group-icon .form-control {
            padding-left: 2.5rem;
        }

        .input-group-icon .input-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
            z-index: 2;
            pointer-events: none;
        }

        .password-strength {
            font-size: 0.78rem;
            margin-top: 0.4rem;
            padding: 0.3rem 0.65rem;
            border-radius: 0.375rem;
            display: none;
            font-weight: 500;
        }

        .password-strength.weak {
            display: block;
            background-color: #fee2e2;
            color: #991b1b;
        }

        .password-strength.ok {
            display: block;
            background-color: #fef9c3;
            color: #854d0e;
        }

        .password-strength.strong {
            display: block;
            background-color: #dcfce7;
            color: #166534;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <div class="auth-brand-icon">
                        <i class="bi bi-box-seam-fill"></i>
                    </div>
                    <h1>ERPy-Lite</h1>
                </div>
                <p>Crea tu cuenta para empezar</p>
            </div>

            {% with mensajes = get_flashed_messages(category_filter=["danger", "warning"]) %}
                {% if mensajes %}
                    {% for msg in mensajes %}
                        <div class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ msg }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group-icon">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" id="email" 
                               name="email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <div class="input-group-icon">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" class="form-control" id="nombre" 
                               name="nombre" placeholder="Tu nombre" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="contraseña" class="form-label">Contraseña</label>
                    <div class="input-group-icon">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="contraseña" 
                               name="contraseña" placeholder="••••••••" required
                               onkeyup="verificarFuerza()">
                    </div>
                    <div id="strength" class="password-strength"></div>
                </div>

                <div class="mb-3">
                    <label for="contraseña2" class="form-label">Confirmar Contraseña</label>
                    <div class="input-group-icon">
                        <i class="bi bi-lock-fill input-icon"></i>
                        <input type="password" class="form-control" id="contraseña2" 
                               name="contraseña2" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-register">
                    <i class="bi bi-person-plus me-1"></i>
                    Crear Cuenta
                </button>
            </form>

            <div class="auth-link">
                <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script>
        function verificarFuerza() {
            const pwd = document.getElementById('contraseña').value;
            const strength = document.getElementById('strength');
            
            if (pwd.length < 6) {
                strength.textContent = '✕ Contraseña muy corta (mínimo 6 caracteres)';
                strength.className = 'password-strength weak';
            } else if (pwd.length < 8) {
                strength.textContent = '⚠ Contraseña débil';
                strength.className = 'password-strength ok';
            } else {
                strength.textContent = '✓ Contraseña fuerte';
                strength.className = 'password-strength strong';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
